name: Bug report
description: Report a reproducible Aici bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, sanitized config, and expected vs actual output.
      placeholder: |
        npx @mgicloud/aici run --config aici.yml

        Expected:
        Actual:
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "@mgicloud/aici 0.1.0"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "node --version"
    validations:
      required: false
  - type: dropdown
    id: provider
    attributes:
      label: Provider path
      options:
        - Fixture/mock output
        - OpenAI Responses
        - OpenAI-compatible chat completions
        - Anthropic Messages
        - GitHub Action
        - Other
    validations:
      required: true
