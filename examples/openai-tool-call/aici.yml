$schema: ../../schemas/aici.schema.json
version: 1
provider:
  type: openai
  model: gpt-5.4-mini
  api: responses
  apiKeyEnv: OPENAI_API_KEY
  timeoutMs: 30000
  retries: 1
  temperature: 0
  maxOutputTokens: 300
tests:
  - name: forced-order-lookup-tool
    promptFile: prompt.md
    toolChoice:
      name: lookup_order
    tools:
      - name: lookup_order
        description: Look up an order by id before answering customer questions.
        parametersFile: lookup-order.parameters.json
        strict: true
    expect:
      toolCalls:
        - name: lookup_order
          argumentsJsonSchema: lookup-order.parameters.json
      maxLatencyMs: 10000
      maxCostUsd: 0.02
