$schema: ../../schemas/aici.schema.json
version: 1
provider:
  type: anthropic
  model: claude-haiku-4-5
  api: messages
  apiKeyEnv: ANTHROPIC_API_KEY
  timeoutMs: 30000
  retries: 1
  temperature: 0
  maxOutputTokens: 300
tests:
  - name: refund-policy-json-claude
    promptFile: prompt.md
    inputFile: input.txt
    expect:
      contains:
        - approved
      jsonSchema: schema.json
      maxLatencyMs: 10000
      maxCostUsd: 0.02
