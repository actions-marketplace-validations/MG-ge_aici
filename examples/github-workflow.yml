name: Aici

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  aici:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
      - uses: MG-ge/aici@v0.1.7
        with:
          config: examples/basic/aici.yml
          report-dir: .aici
          pr-comment: true
