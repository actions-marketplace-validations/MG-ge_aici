name: Aici

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  aici:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: ./
        with:
          config: examples/basic/aici.yml
          report-dir: .aici
          pr-comment: true
