version: 1
provider:
  type: openai
  model: gpt-5.4-mini
  api: responses
  apiKeyEnv: OPENAI_API_KEY
  timeoutMs: 30000
  retries: 1
  temperature: 0
  maxOutputTokens: 300
tests:
  - name: refund-policy-json
    promptFile: prompt.md
    inputFile: input.txt
    expect:
      contains:
        - approved
      jsonSchema: schema.json
      maxLatencyMs: 10000
      maxCostUsd: 0.02
