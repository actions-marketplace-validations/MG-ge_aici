name: Aici
description: Run LLM regression tests and fail pull requests when AI behavior regresses.
branding:
  icon: shield
  color: yellow

inputs:
  config:
    description: Path to the aici config file.
    required: false
    default: aici.yml
  report-dir:
    description: Directory for Markdown and JSON reports.
    required: false
    default: .aici
  install:
    description: Install this action's Node dependencies before executing the CLI. Development escape hatch only; release tags use the bundled action artifact.
    required: false
    default: "false"
  build:
    description: Build this action's CLI before executing it. Development escape hatch only; release tags use the bundled action artifact.
    required: false
    default: "false"
  comment:
    description: Add the Markdown report to the GitHub job summary.
    required: false
    default: "true"
  pr-comment:
    description: Add or update a sticky pull-request comment with the Markdown report.
    required: false
    default: "false"
  upload-artifact:
    description: Upload Markdown and JSON reports as a workflow artifact.
    required: false
    default: "true"
  allow-provider-secrets:
    description: Allow live provider checks with provider API-key environment variables during pull_request or pull_request_target events. Set true only for trusted configs, prompts, schemas, and tool definitions.
    required: false
    default: "false"
  provider-secret-envs:
    description: Space or comma separated provider secret environment variable names guarded during pull_request and pull_request_target events.
    required: false
    default: "OPENAI_API_KEY ANTHROPIC_API_KEY"
  allowed-provider-endpoints:
    description: Space or comma separated provider request URLs allowed during live runs. When set, Aici fails before provider secrets are read if the config contains any other endpoint.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install dependencies
      if: ${{ inputs.install == 'true' }}
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci

    - name: Build CLI
      if: ${{ inputs.build == 'true' }}
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm run build

    - name: Guard provider secrets on pull requests
      shell: bash
      env:
        AICI_ALLOW_PROVIDER_SECRETS: ${{ inputs.allow-provider-secrets }}
        AICI_PROVIDER_SECRET_ENVS: ${{ inputs.provider-secret-envs }}
      run: |
        set -eu

        case "${GITHUB_EVENT_NAME:-}" in
          pull_request|pull_request_target) ;;
          *) exit 0 ;;
        esac

        if [ "$AICI_ALLOW_PROVIDER_SECRETS" = "true" ]; then
          exit 0
        fi

        present=""
        secret_names="$(printf '%s' "$AICI_PROVIDER_SECRET_ENVS" | tr ',' ' ')"
        for env_name in $secret_names; do
          case "$env_name" in
            ''|*[!A-Za-z0-9_]*)
              echo "::error::Invalid provider secret environment variable name: $env_name"
              exit 1
              ;;
          esac

          if [ -n "$(printenv "$env_name" 2>/dev/null || true)" ]; then
            present="${present}${present:+, }${env_name}"
          fi
        done

        if [ -n "$present" ]; then
          echo "::error::Aici provider secret env vars are present during ${GITHUB_EVENT_NAME}. Do not run live provider checks against untrusted PR configs. Move live checks to a trusted workflow or set allow-provider-secrets: true after reviewing aici.yml, prompts, schemas, and tool definitions."
          exit 1
        fi

    - name: Run Aici
      shell: bash
      env:
        AICI_ACTION_PATH: ${{ github.action_path }}
        AICI_CONFIG: ${{ inputs.config }}
        AICI_REPORT_DIR: ${{ inputs.report-dir }}
        AICI_COMMENT: ${{ inputs.comment }}
        AICI_ALLOWED_PROVIDER_ENDPOINTS: ${{ inputs.allowed-provider-endpoints }}
        AICI_BUILD: ${{ inputs.build }}
      run: |
        set +e
        mkdir -p -- "$AICI_REPORT_DIR"
        endpoint_args=()
        endpoints="$(printf '%s' "$AICI_ALLOWED_PROVIDER_ENDPOINTS" | tr ',' ' ')"
        for endpoint in $endpoints; do
          endpoint_args+=(--allow-provider-endpoint "$endpoint")
        done

        cli_path="$AICI_ACTION_PATH/action-dist/cli.js"
        if [ "$AICI_BUILD" = "true" ]; then
          cli_path="$AICI_ACTION_PATH/dist/cli.js"
        fi

        node "$cli_path" run --config "$AICI_CONFIG" --report-dir "$AICI_REPORT_DIR" "${endpoint_args[@]}"
        status=$?
        echo "$status" > "$AICI_REPORT_DIR/exit-code"

        if [ "$AICI_COMMENT" = "true" ] && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
          {
            echo "## Aici"
            echo
            if [ -f "$AICI_REPORT_DIR/aici-report.md" ]; then
              cat -- "$AICI_REPORT_DIR/aici-report.md"
            else
              echo "Report not found."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
        fi

        exit 0

    - name: Upload Aici reports
      if: ${{ always() && inputs.upload-artifact == 'true' }}
      uses: actions/upload-artifact@v7
      with:
        name: aici-report
        path: ${{ inputs.report-dir }}
        include-hidden-files: true

    - name: Update pull request comment
      if: ${{ always() && inputs.pr-comment == 'true' && github.event_name == 'pull_request' }}
      env:
        GH_TOKEN: ${{ github.token }}
        AICI_ACTION_PATH: ${{ github.action_path }}
        AICI_REPORT_DIR: ${{ inputs.report-dir }}
        AICI_REPOSITORY: ${{ github.repository }}
        AICI_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
      shell: bash
      run: node "$AICI_ACTION_PATH/scripts/upsert-pr-comment.mjs"

    - name: Fail workflow on AI regression
      if: ${{ always() }}
      shell: bash
      env:
        AICI_REPORT_DIR: ${{ inputs.report-dir }}
      run: |
        if [ -f "$AICI_REPORT_DIR/exit-code" ]; then
          exit "$(cat "$AICI_REPORT_DIR/exit-code")"
        fi

        exit 1
