<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-label="GitHub Action failing an Aici pull request">
  <rect width="960" height="600" fill="#fbf8ef"/>
  <rect x="42" y="42" width="876" height="516" rx="18" fill="#fffdf7" stroke="#ddd6c5"/>
  <text x="82" y="104" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="18" font-weight="800" fill="#202632">Pull request checks</text>
  <text x="82" y="138" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#565f6d">prompt/refund-tone into main</text>
  <g transform="translate(82 178)">
    <rect width="796" height="74" rx="10" fill="#f6f2e7" stroke="#ddd6c5"/>
    <circle cx="34" cy="37" r="11" fill="#158455"/>
    <text x="58" y="33" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="700" fill="#202632">unit tests</text>
    <text x="58" y="56" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="13" fill="#6f7784">passed in 18s</text>
    <text x="708" y="42" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="13" font-weight="800" fill="#158455">PASS</text>
  </g>
  <g transform="translate(82 274)">
    <rect width="796" height="122" rx="10" fill="#fff8f3" stroke="#e8c4b9"/>
    <circle cx="34" cy="39" r="11" fill="#c54b36"/>
    <text x="58" y="35" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="700" fill="#202632">aici</text>
    <text x="58" y="60" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="13" fill="#6f7784">order-lookup-tool-call failed</text>
    <text x="58" y="88" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="13" fill="#c54b36">expected tool lookup_order, model returned plain text</text>
    <text x="708" y="44" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="13" font-weight="800" fill="#c54b36">FAIL</text>
  </g>
  <g transform="translate(82 418)">
    <rect width="796" height="64" rx="10" fill="#f6f2e7" stroke="#ddd6c5"/>
    <text x="28" y="39" font-family="JetBrains Mono, SFMono-Regular, Consolas, monospace" font-size="14" font-weight="800" fill="#c54b36">Merge blocked until failing AI checks pass.</text>
  </g>
